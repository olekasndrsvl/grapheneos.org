<div class="language-switcher">
    <select id="lang-select" onchange="switchLanguage(this.value)">
        <option value="en" {% if get_lang() == 'en' %}selected="selected"{% endif %}>🇺🇸 English</option>
        <option value="de" {% if get_lang() == 'de' %}selected="selected"{% endif %}>🇩🇪 Deutsch</option>
        <option value="fr" {% if get_lang() == 'fr' %}selected="selected"{% endif %}>🇫🇷 Français</option>
        <option value="es" {% if get_lang() == 'es' %}selected="selected"{% endif %}>🇪🇸 Español</option>
        <option value="ru" {% if get_lang() == 'ru' %}selected="selected"{% endif %}>🇷🇺 Русский</option>
    </select>
</div>
<style>
.language-switcher {
    display: inline-block;
    margin-left: 1rem;
}
.language-switcher select {
    background: transparent;
    color: inherit;
    border: 1px solid currentColor;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.875rem;
}
.language-switcher select:hover {
    background: rgba(128, 128, 128, 0.2);
}
</style>
<script>
(function() {
    const langSelect = document.getElementById('lang-select');
    const currentLang = (window.location.pathname.match(/^\/(de|fr|es|ru)\//) || ['en'])[1];
    
    if (langSelect.value !== currentLang) {
        langSelect.value = currentLang;
    }
    
    langSelect.addEventListener('change', function() {
        const newLang = this.value;
        localStorage.setItem('preferred-lang', newLang);
        
        let newPath = window.location.pathname;
        // Remove any existing language prefix
        newPath = newPath.replace(/^\/(de|fr|es|ru)\//, '/');
        
        if (newLang === 'en') {
            // Go to root (remove language prefix)
            window.location.href = newPath || '/';
        } else {
            // Add new language prefix
            window.location.href = '/' + newLang + newPath;
        }
    });
    
    document.addEventListener('click', function(e) {
        const link = e.target.closest('a[href^="/"]');
        if (link && !link.hasAttribute('download')) {
            const preferredLang = localStorage.getItem('preferred-lang');
            if (preferredLang && preferredLang !== 'en') {
                let href = link.getAttribute('href');
                // Remove any existing language prefix from the target href
                href = href.replace(/^\/(de|fr|es|ru)\//, '/');
                if (!href.match(/^\/(de|fr|es|ru)\//)) {
                    e.preventDefault();
                    window.location.href = '/' + preferredLang + href;
                }
            }
        }
    }, true);
})();
</script>
