# Language detection maps
map $http_accept_language $preferred_lang {
    default en;
    ~*ru  ru;
    ~*de  de;
    ~*fr  fr;
    ~*es  es;
}

map $cookie_lang $lang_from_cookie {
    default "";
    ~*^(ru|de|fr|es)$ $cookie_lang;
}

server {
    listen 80;
    server_name grapheneostest.org localhost;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    # Root redirect with cookie support
    location = / {
        set $target_lang $preferred_lang;
        set $use_lang $target_lang;
        
        if ($lang_from_cookie ~ ^(ru|de|fr|es)$) {
            set $use_lang $lang_from_cookie;
        }
        
        if ($use_lang != en) {
            add_header Set-Cookie "lang=$use_lang; Max-Age=31536000; Path=/";
            return 302 /$use_lang/;
        }
        
        try_files /index.html /404.html;
    }

    # Language directories - serve from subdirectories with proper index
    location /de {
        try_files $uri $uri/index.html =404;
    }
    location /fr {
        try_files $uri $uri/index.html =404;
    }
    location /es {
        try_files $uri $uri/index.html =404;
    }
    location /ru {
        try_files $uri $uri/index.html =404;
    }

    # Root files (English)
    location / {
        try_files $uri $uri/index.html /404.html;
    }
}
