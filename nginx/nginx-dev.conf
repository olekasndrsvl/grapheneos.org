# Language map - must be in http context
# This will be included at server level

# Determine language from Accept-Language header
map $http_accept_language $preferred_lang {
    default en;
    ~*ru  ru;
    ~*de  de;
    ~*fr  fr;
    ~*es  es;
}

# Cookie overrides Accept-Language  
map $cookie_lang $lang {
    default $preferred_lang;
    ~*ru ru;
    ~*de de;
    ~*fr fr;
    ~*es es;
    ~*en en;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Language redirect based on Accept-Language or cookie
    location = / {
        # If cookie exists, use it for redirect
        if ($cookie_lang) {
            set $target_lang $cookie_lang;
        }
        
        # Otherwise use Accept-Language
        if ($target_lang = "") {
            set $target_lang $preferred_lang;
        }
        
        # If target is not English, redirect to language prefixed URL
        if ($target_lang != "en") {
            add_header Set-Cookie "lang=$target_lang; Max-Age=31536000; Path=/";
            return 302 /$target_lang/;
        }
        
        # Default English - serve root
        try_files /index.html =404;
    }

    # Serve language prefixed directories
    location / {
        # Try the exact URI first, then .html, then index.html
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Fallback for missing language versions - serve English
    location @fallback {
        rewrite ^/(ru|de|fr|es)/(.*)$ /$2 break;
        try_files $uri $uri/ =404;
    }
}
