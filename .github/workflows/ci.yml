name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cssselect pytest
          
      - name: Run Python tests
        run: |
          python -m pytest tests/test_i18n.py tests/test_date_formatting.py tests/test_number_currency.py tests/test_jinja2_integration.py -v --tb=short
          
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm ci
          
      - name: Run ESLint
        run: |
          npx eslint static/js/ --max-warnings=0 || true
          
      - name: Run Stylelint
        run: |
          npx stylelint static/css/ --max-warnings=0 || true

  playwright:
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cssselect
          
      - name: Install Node.js dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install npm packages
        run: |
          npm ci
          npm install -g stylelint csso-cli eslint terser html-minifier-terser
          
      - name: Install Playwright browsers
        run: |
          npx playwright install chromium
          
      - name: Build Docker image
        run: |
          docker build -t grapheneos-website .
          
      - name: Start Docker container
        run: |
          docker run -d -p 8080:80 --name grapheneos grapheneos-website
          sleep 5
          
      - name: Run Playwright tests
        run: |
          npx playwright test tests/functional.spec.cjs --reporter=list
          
      - name: Stop Docker container
        if: always()
        run: |
          docker rm -f grapheneos || true

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cssselect
          
      - name: Install Node.js dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install npm packages
        run: |
          npm ci
          npm install -g stylelint csso-cli eslint terser html-minifier-terser
          
      - name: Run build
        run: |
          ./process-templates static
          
      - name: Verify build output
        run: |
          echo "Build completed successfully"
          ls -la static-tmp/
