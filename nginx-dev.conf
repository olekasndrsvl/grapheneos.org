server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Accept-Language redirect for root
    location = / {
        set $lang "en";
        
        if ($http_accept_language ~ "^ru") {
            set $lang "ru";
        }
        if ($http_accept_language ~ "^de") {
            set $lang "de";
        }
        if ($http_accept_language ~ "^fr") {
            set $lang "fr";
        }
        if ($http_accept_language ~ "^es") {
            set $lang "es";
        }
        
        # Check if lang is not English and redirect
        # Only redirect if no preferred_lang cookie
        set $redirect_to "/";
        
        # For now, just serve the default
        try_files $uri $uri/ $uri.html index.html =404;
    }

    location / {
        try_files $uri $uri/ $uri.html index.html =404;
    }
}
